name: otzaria_icons
description: Custom icons for Otzaria, with a Fluent UI compatible API.
version: 0.2.0
repository: https://github.com/Otzaria/otzaria_icons
issue_tracker: https://github.com/Otzaria/otzaria_icons/issues
publish_to: none

environment:
  sdk: ">=3.2.6 <4.0.0"
  flutter: ">=3.16.9"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  icon_font_generator: 4.1.0
  path: ">=1.8.3 <2.0.0"
  path_parsing: ^1.1.0
  xml: ^6.5.0
  yaml: ^3.1.2

flutter:
  fonts:
    - family: OtzariaIcons
      fonts:
        - asset: lib/fonts/otzaria_icons.otf
