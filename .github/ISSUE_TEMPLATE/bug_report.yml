name: Bug report
description: Report incorrect rendering, metadata, generation, or packaging.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: input
    id: icon
    attributes:
      label: Icon name
      placeholder: book_open_arc_24_regular
  - type: input
    id: version
    attributes:
      label: Package tag/version
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: flutter
    attributes:
      label: Flutter version and platform
      placeholder: Flutter 3.44.0, Windows
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include minimal code, commands, logs, and screenshots as applicable.
    validations:
      required: true

